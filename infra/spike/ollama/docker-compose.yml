# Standalone spike harness for the local AI tier.
#
# Brings up only Ollama (with GPU passthrough) so we can benchmark the
# DeepSeek-R1 distill on the target hardware before committing to the
# full local-ai-service skeleton in P1.
#
# Run:
#   cd infra/spike/ollama
#   docker compose up -d
#   docker compose exec ollama ollama pull deepseek-r1:7b
#   docker compose exec ollama ollama create planner -f /Modelfile.planner
#   python ../bench.py --model planner --queries ../queries.txt
#
# Tear down:
#   docker compose down -v
#
# This compose file is intentionally NOT included in the project root
# docker-compose.yml — the spike runs in isolation so the rest of the
# stack does not need to be up to evaluate the model.
name: llm-council-spike

services:

  ollama:
    image: ollama/ollama:0.5.7@sha256:7e672211886f8bd4448a98ed577e26c816b9e8b052112860564afaa2c105800e
    runtime: nvidia
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
      # Maxwell sometimes needs CUDA visibility set explicitly when the
      # toolkit has multiple devices. Keep this commented unless you see
      # the model load on CPU only.
      # NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ollama-data:/root/.ollama
      - ./Modelfile.planner:/Modelfile.planner:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  ollama-data:
