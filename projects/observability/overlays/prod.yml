# Production overlay for the observability tier.
#
# The base file does not publish ports, so there is nothing to reset. This
# overlay adds restart policies for the long-running observability services.
# The Grafana sub-path block was removed 2026-05-22 (P1.7) — Grafana is gone.

services:

  zipkin:
    restart: unless-stopped

  prometheus:
    restart: unless-stopped

  victorialogs:
    restart: unless-stopped

  alloy:
    restart: unless-stopped
