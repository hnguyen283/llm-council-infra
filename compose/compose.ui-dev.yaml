volumes:
  portal-ui-dev-node-modules:

services:
  portal-ui-dev:
    image: node:24-alpine@sha256:a0b9bf06e4e6193cf7a0f58816cc935ff8c2a908f81e6f1a95432d679c54fbfd
    working_dir: /workspace
    command:
      - sh
      - -c
      - >-
        npm ci &&
        npx ng serve --host 0.0.0.0 --port 4200
        --proxy-config /infra/proxy.conf.json
        ${UI_DEV_TLS_ARGS:-}
    networks: [llm-council-app]
    depends_on:
      api-gateway: { condition: service_healthy }
    volumes:
      - ../../llm-council-ui:/workspace
      - portal-ui-dev-node-modules:/workspace/node_modules
      - ../edge/ui-dev/proxy.conf.json:/infra/proxy.conf.json:ro
      - ${HTTPS_CERT_DIR:-../ssl}:/run/tls:ro
    ports:
      - "${PUBLIC_HOST_BIND:-127.0.0.1}:${PUBLIC_PORT:-4200}:4200"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- ${PUBLIC_SCHEME:-http}://127.0.0.1:4200/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped
