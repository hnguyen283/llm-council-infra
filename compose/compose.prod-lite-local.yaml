# Resource-constrained, production-like local runtime for 16 GB Windows laptops.
#
# This overlay preserves the normal user-facing workflow while reducing
# operational overhead: observability containers are profile-gated, tracing is
# disabled, and container memory/CPU budgets are capped for laptop use.

x-prod-lite-spring-env: &prod-lite-spring-env
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Dstdout.encoding=UTF-8 -Dstderr.encoding=UTF-8 -XX:MaxRAMPercentage=70.0"
  MANAGEMENT_TRACING_ENABLED: "false"
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"

services:
  zipkin:
    profiles: ["observability"]
  prometheus:
    profiles: ["observability"]
  victorialogs:
    profiles: ["observability"]
  alloy:
    profiles: ["observability"]

  postgres:
    mem_limit: 900m
    cpus: 0.90
    command:
      - postgres
      - -c
      - shared_preload_libraries=age
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB

  valkey:
    mem_limit: 160m
    cpus: 0.25
    command:
      - valkey-server
      - --requirepass
      - ${VALKEY_PASSWORD}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - volatile-ttl

  kafka:
    mem_limit: 900m
    cpus: 0.90
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-4}

  ollama:
    mem_limit: 2560m
    cpus: 1.50
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}

  config-server:
    mem_limit: 320m
    cpus: 0.35
    environment:
      <<: *prod-lite-spring-env
      CONFIG_REPO_PATH: file:/config-repo
  discovery-server:
    mem_limit: 320m
    cpus: 0.35
    environment:
      <<: *prod-lite-spring-env

  api-gateway:
    mem_limit: 576m
    cpus: 0.60
    environment:
      <<: *prod-lite-spring-env
  auth-service:
    mem_limit: 512m
    cpus: 0.50
    environment:
      <<: *prod-lite-spring-env
  account-service:
    mem_limit: 512m
    cpus: 0.50
    environment:
      <<: *prod-lite-spring-env
      SPRING_PROFILES_ACTIVE: docker,prod
      ACCOUNT_INTERNAL_AUTH_ENABLED: "true"
  prompt-service:
    mem_limit: 640m
    cpus: 0.60
    environment:
      <<: *prod-lite-spring-env
  orchestrator-service:
    mem_limit: 640m
    cpus: 0.70
    depends_on:
      graphrag-retrieval-service: { condition: service_healthy }
    environment:
      <<: *prod-lite-spring-env
      ORCHESTRATOR_JOB_STORE: valkey
  gpt-service:
    mem_limit: 512m
    cpus: 0.40
    environment:
      <<: *prod-lite-spring-env
  gemini-service:
    mem_limit: 512m
    cpus: 0.40
    environment:
      <<: *prod-lite-spring-env
  local-ai-service:
    mem_limit: 384m
    cpus: 0.40
    depends_on:
      ollama: { condition: service_healthy }
    environment:
      <<: *prod-lite-spring-env
      LOCAL_AI_MODEL: ${LOCAL_AI_MODEL:-planner}

  graphrag-retrieval-service:
    mem_limit: 768m
    cpus: 0.60
    depends_on:
      postgres: { condition: service_healthy }
      valkey: { condition: service_healthy }
      ollama: { condition: service_healthy }
    environment:
      GRPC_MAX_WORKERS: ${GRPC_MAX_WORKERS:-2}
      INGESTION_MAX_RETRIES: ${INGESTION_MAX_RETRIES:-2}
      OTEL_EXPORTER_OTLP_ENDPOINT: ""

  graphrag-indexing-worker:
    mem_limit: 512m
    cpus: 0.50
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      valkey: { condition: service_healthy }
      ollama: { condition: service_healthy }
    environment:
      GRPC_MAX_WORKERS: ${GRPC_MAX_WORKERS:-2}
      INGESTION_MAX_RETRIES: ${INGESTION_MAX_RETRIES:-2}
      OTEL_EXPORTER_OTLP_ENDPOINT: ""

  portal-edge:
    mem_limit: 128m
    cpus: 0.25
