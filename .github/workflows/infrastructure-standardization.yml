name: infrastructure-standardization

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the portable CI contract
        run: bash ci/run.sh all
      - name: Publish sanitized CI evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-contract
          path: .ci/evidence
          if-no-files-found: error
  render-options:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        option:
          - dev-full-http
          - dev-full-https
          - dev-local-ai
          - prod-full-local-http
          - prod-full-local-https
          - prod-full-local-https-tunnel
          - prod-full-local-observability
          - prod-lite-local
    steps:
      - uses: actions/checkout@v4
      - name: Render Compose option through portable contract
        run: bash ci/run.sh validate
      - name: Publish sanitized CI evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-${{ matrix.option }}
          path: .ci/evidence
          if-no-files-found: error
